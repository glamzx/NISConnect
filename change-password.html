<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password — NISLink</title>
    <meta name="description" content="Change your NISLink account password." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] },
                    colors: {
                        navy: { DEFAULT: '#0B1D3A', light: '#15325E' },
                        accent: { DEFAULT: '#C8FF00', soft: '#D4FF4D' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/custom.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="font-body bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md animate-fade-in-up">
        <!-- Header -->
        <div class="flex items-center gap-2 mb-8">
            <div class="w-10 h-10 bg-accent rounded-full flex items-center justify-center">
                <span class="font-display font-900 text-navy text-lg">N</span>
            </div>
            <span class="font-display font-bold text-xl text-navy">NISLink</span>
        </div>

        <h2 class="font-display font-800 text-3xl text-navy mb-2">Change Password</h2>
        <p class="text-gray-400 mb-8">Verify your current password, then set a new one.</p>

        <div id="change-pw-card" class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm space-y-5">
            <div>
                <label class="form-label">Current Password</label>
                <input type="password" id="cp-current" class="form-input" placeholder="Enter current password" required />
            </div>
            <div>
                <label class="form-label">New Password</label>
                <input type="password" id="cp-new" class="form-input" placeholder="Min 6 characters" minlength="6" />
            </div>
            <div>
                <label class="form-label">Confirm New Password</label>
                <input type="password" id="cp-confirm" class="form-input" placeholder="Repeat new password" />
            </div>

            <div id="cp-msg" class="hidden text-sm rounded-lg px-4 py-2"></div>

            <button onclick="doChangePassword()" id="cp-btn"
                class="btn-primary w-full justify-center text-base !py-4">
                <i data-lucide="lock" class="w-5 h-5"></i>
                Update Password
            </button>
        </div>

        <a href="dashboard.html"
            class="flex items-center justify-center gap-1 text-gray-400 text-sm mt-6 hover:text-navy transition">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Back to Dashboard
        </a>
    </div>

    <script src="js/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        function showMsg(text, type) {
            const el = document.getElementById('cp-msg');
            el.textContent = text;
            el.className = `text-sm rounded-lg px-4 py-2 ${type === 'error' ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
            el.classList.remove('hidden');
        }

        async function doChangePassword() {
            const current = document.getElementById('cp-current').value;
            const newPw = document.getElementById('cp-new').value;
            const confirm = document.getElementById('cp-confirm').value;
            const btn = document.getElementById('cp-btn');

            if (!current) { showMsg('Please enter your current password.', 'error'); return; }
            if (!newPw || newPw.length < 6) { showMsg('New password must be at least 6 characters.', 'error'); return; }
            if (newPw !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Verifying…';

            try {
                // Step 1: Verify current password by re-signing in
                const session = await sbGetSession();
                if (!session?.user?.email) {
                    showMsg('You must be logged in. Redirecting…', 'error');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                    return;
                }

                const { error: signInErr } = await supabaseClient.auth.signInWithPassword({
                    email: session.user.email,
                    password: current
                });

                if (signInErr) {
                    showMsg('Current password is incorrect.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i data-lucide="lock" class="w-5 h-5"></i> Update Password';
                    lucide.createIcons();
                    return;
                }

                // Step 2: Update password
                const { error: updateErr } = await supabaseClient.auth.updateUser({ password: newPw });
                if (updateErr) {
                    showMsg('Failed to update: ' + updateErr.message, 'error');
                } else {
                    showMsg('Password changed successfully! Redirecting…', 'success');
                    document.getElementById('cp-current').value = '';
                    document.getElementById('cp-new').value = '';
                    document.getElementById('cp-confirm').value = '';
                    setTimeout(() => window.location.href = 'dashboard.html', 2000);
                }
            } catch(e) {
                showMsg('An error occurred. Please try again.', 'error');
                console.error(e);
            }
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="lock" class="w-5 h-5"></i> Update Password';
            lucide.createIcons();
        }

        // Redirect if not logged in
        (async () => {
            const s = await sbGetSession();
            if (!s) window.location.href = 'login.html';
        })();
    </script>
    <script>lucide.createIcons();</script>
</body>

</html>
