<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password — NISLink</title>
    <meta name="description" content="Set your new NISLink password." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Inter', 'sans-serif'] },
                    colors: {
                        navy: { DEFAULT: '#0B1D3A', light: '#15325E' },
                        accent: { DEFAULT: '#C8FF00', soft: '#D4FF4D' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/custom.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="font-body bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md animate-fade-in-up">
        <div class="flex items-center gap-2 mb-8">
            <div class="w-10 h-10 bg-accent rounded-full flex items-center justify-center">
                <span class="font-display font-900 text-navy text-lg">N</span>
            </div>
            <span class="font-display font-bold text-xl text-navy">NISLink</span>
        </div>

        <h2 class="font-display font-800 text-3xl text-navy mb-2">Set New Password</h2>
        <p class="text-gray-400 mb-8">Choose a strong password for your account.</p>

        <div id="rp-form" class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm space-y-5">
            <div>
                <label class="form-label">New Password</label>
                <input type="password" id="rp-new" class="form-input" placeholder="Min 6 characters" minlength="6" />
            </div>
            <div>
                <label class="form-label">Confirm Password</label>
                <input type="password" id="rp-confirm" class="form-input" placeholder="Repeat password" />
            </div>

            <div id="rp-msg" class="hidden text-sm rounded-lg px-4 py-2"></div>

            <button onclick="doReset()" id="rp-btn"
                class="btn-primary w-full justify-center text-base !py-4">
                <i data-lucide="check" class="w-5 h-5"></i>
                Set New Password
            </button>
        </div>

        <!-- Success state -->
        <div id="rp-success" class="hidden text-center space-y-4 py-6">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check-circle" class="w-8 h-8 text-green-500"></i>
            </div>
            <h3 class="font-display font-bold text-xl text-navy">Password Updated!</h3>
            <p class="text-gray-400 text-sm">Your password has been changed. You can now sign in with your new password.</p>
            <a href="login.html"
                class="btn-primary inline-flex items-center gap-2 justify-center text-base !py-3 !px-8 mt-4">
                <i data-lucide="log-in" class="w-5 h-5"></i>
                Sign In
            </a>
        </div>
    </div>

    <script src="js/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        function showRpMsg(text, type) {
            const el = document.getElementById('rp-msg');
            el.textContent = text;
            el.className = `text-sm rounded-lg px-4 py-2 ${type === 'error' ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
            el.classList.remove('hidden');
        }

        async function doReset() {
            const newPw = document.getElementById('rp-new').value;
            const confirm = document.getElementById('rp-confirm').value;
            const btn = document.getElementById('rp-btn');

            if (!newPw || newPw.length < 6) { showRpMsg('Password must be at least 6 characters.', 'error'); return; }
            if (newPw !== confirm) { showRpMsg('Passwords do not match.', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Updating…';

            try {
                const { error } = await supabaseClient.auth.updateUser({ password: newPw });
                if (error) {
                    showRpMsg('Error: ' + error.message, 'error');
                } else {
                    document.getElementById('rp-form').classList.add('hidden');
                    document.getElementById('rp-success').classList.remove('hidden');
                    lucide.createIcons();
                }
            } catch(e) {
                showRpMsg('An error occurred. Please try again.', 'error');
            }
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> Set New Password';
            lucide.createIcons();
        }
    </script>
    <script>lucide.createIcons();</script>
</body>

</html>
